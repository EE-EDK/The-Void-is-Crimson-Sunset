    <style>
        /* Override for index page */
        body {
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden; /* Prevent scrollbars from canvas */
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Force behind everything */
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 0 5%;
            position: relative;
            z-index: 10000;
        }

        .title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 0.25em;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 10; /* High z-index */
        }

        .void-word {
            display: inline-block;
            position: relative;
            animation: tendrils 10s infinite ease-in-out;
            color: #ffffff;
            font-weight: 400;
            z-index: 11;
        }

        @keyframes tendrils {
            0%, 100% {
                text-shadow:
                    0 0 4px rgba(0, 0, 0, 0.8),
                    0 0 8px rgba(0, 0, 0, 0.4);
            }
            20% {
                text-shadow:
                    0 0 4px rgba(0, 0, 0, 0.8),
                    10px 6px 4px rgba(0, 0, 0, 1),
                    -8px 12px 5px rgba(0, 0, 0, 0.9),
                    6px -10px 3px rgba(0, 0, 0, 0.8),
                    -14px -4px 6px rgba(0, 0, 0, 0.7),
                    12px 14px 10px rgba(0, 0, 0, 0.6);
            }
            45% {
                text-shadow:
                    0 0 4px rgba(0, 0, 0, 0.8),
                    22px 10px 5px rgba(0, 0, 0, 1),
                    -18px 25px 6px rgba(0, 0, 0, 0.95),
                    14px -22px 4px rgba(0, 0, 0, 0.9),
                    -28px -8px 7px rgba(0, 0, 0, 0.85),
                    25px 28px 8px rgba(0, 0, 0, 0.8),
                    -10px -30px 5px rgba(0, 0, 0, 0.75),
                    30px -12px 6px rgba(0, 0, 0, 0.7);
            }
            70% {
                text-shadow:
                    0 0 4px rgba(0, 0, 0, 0.8),
                    40px 15px 6px rgba(0, 0, 0, 1),
                    -32px 40px 7px rgba(0, 0, 0, 0.95),
                    20px -38px 5px rgba(0, 0, 0, 0.9),
                    -45px -12px 8px rgba(0, 0, 0, 0.85),
                    38px 42px 9px rgba(0, 0, 0, 0.8),
                    -15px -48px 6px rgba(0, 0, 0, 0.75),
                    50px -18px 7px rgba(0, 0, 0, 0.7),
                    -42px 20px 8px rgba(0, 0, 0, 0.65);
            }
            85% {
                text-shadow:
                    0 0 4px rgba(0, 0, 0, 0.8),
                    18px 8px 5px rgba(0, 0, 0, 0.9),
                    -12px 18px 5px rgba(0, 0, 0, 0.7),
                    8px -14px 4px rgba(0, 0, 0, 0.6);
            }
        }

        .index-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
            margin-bottom: 3rem;
            text-transform: lowercase;
            z-index: 2;
        }

        .acts-navigation {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: fixed;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            align-items: flex-end;
            z-index: 3;
        }

        .act-link {
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 400;
            color: rgba(255, 150, 150, 0.8);
            text-decoration: none;
            border: 1px solid rgba(139, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 0.75rem 2rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: right;
            width: fit-content;
        }

        .act-link:hover {
            color: #ffffff;
            background-color: rgba(139, 0, 0, 0.4);
            border-color: #ff4444;
            box-shadow: -5px 0 20px rgba(255, 0, 0, 0.3);
            transform: translateX(-10px);
        }

        .act-link::after {
            content: attr(data-subtitle);
            display: block;
            font-size: 0.55em;
            color: rgba(255, 255, 255, 0);
            letter-spacing: 2px;
            margin-top: 4px;
            transition: color 0.8s ease;
            font-style: italic;
        }

        .act-link:hover::after {
            color: rgba(255, 255, 255, 0.5);
        }

        .index-warning {
            font-size: 0.75rem;
            color: rgba(255, 100, 100, 0.4);
            letter-spacing: 2px;
            position: fixed;
            bottom: 2rem;
            width: 100%;
            left: 0;
            text-align: center;
            z-index: 2;
            animation: warning-pulse 4s ease-in-out infinite;
        }

        @keyframes warning-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* Accessibility improvements */
        .skip-to-content {
            position: absolute;
            top: -40px;
            left: 0;
            background: #8b0000;
            color: white;
            padding: 8px;
            text-decoration: none;
            z-index: 100;
        }

        .skip-to-content:focus {
            top: 0;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
            }

            .title {
                letter-spacing: 0.1em;
            }

            .index-tagline {
                letter-spacing: 2px;
                margin-bottom: 1.5rem;
            }

            .acts-navigation {
                position: static;
                transform: none;
                align-items: center;
                gap: 1rem;
                margin-top: 1rem;
            }

            .act-link {
                padding: 0.5rem 1.25rem;
                text-align: center;
            }

            .act-link:hover {
                transform: none;
            }

            .index-warning {
                position: static;
                margin-top: 2rem;
            }

            .void-word {
                animation-duration: 10s !important;
            }
        }

        @media (max-width: 480px) {
            .title {
                letter-spacing: 0.05em;
            }

            .index-tagline {
                letter-spacing: 1px;
                margin-bottom: 1rem;
            }

            .act-link {
                padding: 0.4rem 1rem;
                font-size: 0.9rem;
            }
