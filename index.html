    <!-- Index-specific styles -->
    <style>
        /* Override for index page */
        body {
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden; /* Prevent scrollbars from canvas */
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Force behind everything */
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 0 5%;
            position: relative;
            z-index: 10000;
        }

        .title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 0.25em;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 10;
            /* Override shared-styles fadeIn — children handle their own phase-in */
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
        }

        /* --- Phase 1: "The Void" fades in: transparent black → red → white (2.5s) --- */
        .title-the-void {
            display: inline;
            opacity: 0;
            color: #000000;
            animation: theVoidPhase 2.5s ease-out forwards;
        }

        @keyframes theVoidPhase {
            0%   { opacity: 0; color: #000000; }
            30%  { opacity: 1; color: #1a0000; }
            60%  { color: #8b0000; }
            85%  { color: #cc3333; }
            100% { color: #ffffff; }
        }

        /* --- Phase 2: "at Crimson Sunset" cascading color wave (2.5s, delayed 2.5s) --- */
        .title-subtitle {
            display: inline;
        }
        .title-subtitle .cascade-letter {
            display: inline-block;
            opacity: 0;
            animation: cascadeWave 2.5s ease-out forwards;
            min-width: 0.3em; /* preserve space width */
        }

        @keyframes cascadeWave {
            0%   { opacity: 0; color: #1a0000; }
            10%  { opacity: 1; color: #2d0000; }
            15%  { color: #4a0000; }
            20%  { color: #6b0000; }
            25%  { color: #8b0000; }
            30%  { color: #a52a00; }
            35%  { color: #b84400; }
            40%  { color: #cc5500; }
            45%  { color: #d46a00; }
            50%  { color: #dd7700; }
            55%  { color: #e68a00; }
            60%  { color: #ee9911; }
            65%  { color: #dd7700; }
            70%  { color: #cc5500; }
            75%  { color: #bb3300; }
            80%  { color: #cc5544; }
            85%  { color: #dd8877; }
            90%  { color: #eebbaa; }
            95%  { color: #f5ddd5; }
            100% { color: #ffffff; }
        }

        /* --- Phase 3: "Void" tendrils start after 5s --- */
        .void-word {
            display: inline;
            position: relative;
            font-weight: 400;
            z-index: 11;
        }
        .void-word.tendrils-active {
            animation: tendrils 8s infinite ease-in-out;
        }

        @keyframes tendrils {
            0%, 100% {
                text-shadow:
                    0 0 8px rgba(139, 0, 0, 1),
                    0 0 20px rgba(139, 0, 0, 0.6),
                    0 0 40px rgba(100, 0, 0, 0.3);
            }
            20% {
                text-shadow:
                    0 0 8px rgba(139, 0, 0, 1),
                    12px 8px 6px rgba(139, 0, 0, 1),
                    -10px 14px 8px rgba(139, 0, 0, 0.9),
                    8px -12px 5px rgba(139, 0, 0, 0.8),
                    -16px -6px 10px rgba(139, 0, 0, 0.7),
                    14px 16px 14px rgba(100, 0, 0, 0.5);
            }
            45% {
                text-shadow:
                    0 0 8px rgba(139, 0, 0, 1),
                    25px 12px 8px rgba(139, 0, 0, 1),
                    -20px 28px 10px rgba(139, 0, 0, 0.95),
                    16px -25px 6px rgba(139, 0, 0, 0.9),
                    -32px -10px 12px rgba(139, 0, 0, 0.8),
                    28px 30px 14px rgba(100, 0, 0, 0.7),
                    -12px -34px 8px rgba(100, 0, 0, 0.6),
                    34px -14px 10px rgba(80, 0, 0, 0.5);
            }
            70% {
                text-shadow:
                    0 0 10px rgba(139, 0, 0, 1),
                    45px 18px 10px rgba(139, 0, 0, 1),
                    -36px 44px 12px rgba(139, 0, 0, 0.95),
                    22px -42px 8px rgba(139, 0, 0, 0.9),
                    -50px -14px 14px rgba(139, 0, 0, 0.8),
                    42px 46px 16px rgba(100, 0, 0, 0.7),
                    -18px -52px 10px rgba(100, 0, 0, 0.6),
                    55px -20px 12px rgba(80, 0, 0, 0.5),
                    -46px 22px 14px rgba(80, 0, 0, 0.4);
            }
            85% {
                text-shadow:
                    0 0 8px rgba(139, 0, 0, 1),
                    20px 10px 8px rgba(139, 0, 0, 0.9),
                    -14px 20px 8px rgba(139, 0, 0, 0.7),
                    10px -16px 6px rgba(100, 0, 0, 0.5);
            }
        }

        .index-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: rgba(255, 255, 255, 0.6);
            animation: none !important;
            opacity: 1 !important;
            letter-spacing: 4px;
            margin-bottom: 3rem;
            text-transform: lowercase;
            z-index: 2;
        }

        .acts-navigation {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: fixed;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            align-items: flex-end;
            z-index: 3;
        }

        .act-link {
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 400;
            color: rgba(255, 150, 150, 0.8);
            text-decoration: none;
            border: 1px solid rgba(139, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 0.75rem 2rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: right;
            width: fit-content;
        }

        .act-link:hover {
            color: #ffffff;
            background-color: rgba(139, 0, 0, 0.4);
            border-color: #ff4444;
            box-shadow: -5px 0 20px rgba(255, 0, 0, 0.3);
            transform: translateX(-10px);
        }

        .act-link::after {
            content: attr(data-subtitle);
            display: block;
            font-size: 0.55em;
            color: rgba(255, 255, 255, 0);
            letter-spacing: 2px;
            margin-top: 4px;
            transition: color 0.8s ease;
            font-style: italic;
        }

        .act-link:hover::after {
            color: rgba(255, 255, 255, 0.5);
        }

        .index-warning {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            position: fixed;
            bottom: 2rem;
            width: 100%;
            left: 0;
            text-align: center;
            z-index: 2;
            text-shadow:
                0 0 8px rgba(255, 255, 255, 0.5),
                0 0 16px rgba(255, 255, 255, 0.25),
                0 0 30px rgba(255, 255, 255, 0.1);
            animation: warning-pulse 4s ease-in-out infinite;
        }

        @keyframes warning-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.85; }
        }

        /* Accessibility improvements */
        .skip-to-content {
            position: absolute;
            top: -40px;
            left: 0;
            background: #8b0000;
            color: white;
            padding: 8px;
            text-decoration: none;
            z-index: 100;
        }

        .skip-to-content:focus {
            top: 0;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
            }

            .title {
                letter-spacing: 0.1em;
            }

            .index-tagline {
                letter-spacing: 2px;
                margin-bottom: 1.5rem;
            }

            .acts-navigation {
                position: static;
                transform: none;
                align-items: center;
                gap: 1rem;
                margin-top: 1rem;
            }

            .act-link {
                padding: 0.5rem 1.25rem;
                text-align: center;
            }

            .act-link:hover {
                transform: none;
            }

            .index-warning {
                position: static;
                margin-top: 2rem;
            }

            .void-word {
                animation-duration: 10s !important;
            }
        }

        @media (max-width: 480px) {
            .title {
                letter-spacing: 0.05em;
            }

            .index-tagline {
                letter-spacing: 1px;
                margin-bottom: 1rem;
            }

            .act-link {
                padding: 0.4rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>

    
    
    <!-- Updated Three.js r160 with SRI -->
    
    <script>

<body>

    <!-- Accessibility: Skip to content link -->
    <a href="#main-content" class="skip-to-content">Skip to content</a>

    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <main id="main-content" class="container" role="main">
        <h1 class="title"><span class="title-the-void">The <span class="void-word">Void</span></span> <span class="title-subtitle" id="title-subtitle">at Crimson Sunset</span></h1>
        <p class="index-tagline horror-whisper" data-whisper="you were always coming here" style="margin-left: 100px;">interactive cosmic horror experience</p>

    </main>

    <script>
        // Split "at Crimson Sunset" into individual letters for cascade animation
        document.addEventListener('DOMContentLoaded', function() {
            var subtitle = document.getElementById('title-subtitle');
            var text = subtitle.textContent;
            subtitle.textContent = '';
            var totalLetters = text.length;
            for (var i = 0; i < totalLetters; i++) {
                var span = document.createElement('span');
                span.className = 'cascade-letter';
                span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
                // Stagger: 2.5s base delay + spread each letter across 1.5s of the 2.5s window
                var stagger = 2.5 + (i / totalLetters) * 1.5;
                span.style.animationDelay = stagger.toFixed(2) + 's';
                subtitle.appendChild(span);
            }

            // Start tendrils on "Void" after both phases complete (5s)
            setTimeout(function() {
                var voidWord = document.querySelector('.void-word');
                if (voidWord) voidWord.classList.add('tendrils-active');
            }, 5000);
        });
    </script>
    <script src="./assets/js/visuals-engine.js" defer></script>
