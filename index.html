        body {
            font-family: 'Cormorant Garamond', serif;

        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Force behind everything */
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 0 5%;

            z-index: 10000;

        .title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 0.25em;
            margin-bottom: 0.5rem;

            z-index: 10;
            /* Override shared-styles fadeIn — children handle their own phase-in */

        /* Each title line is a block so they never wrap mid-word */

        /* "Void" tendrils — activated by JS after intro */
        .void-word {
            display: inline;
            position: relative;
            font-weight: 400;
            z-index: 11;
        }
        .void-word.tendrils-active {
            animation: tendrils 8s infinite ease-in-out !important;
        }

        @keyframes tendrils {
            0%, 100% {
                text-shadow:
                    0 0 8px rgba(139, 0, 0, 1),
                    0 0 20px rgba(139, 0, 0, 0.6),
                    0 0 40px rgba(100, 0, 0, 0.3);
            }
            20% {
                text-shadow:
                    0 0 8px rgba(139, 0, 0, 1),
                    12px 8px 6px rgba(139, 0, 0, 1),
                    -10px 14px 8px rgba(139, 0, 0, 0.9),
                    8px -12px 5px rgba(139, 0, 0, 0.8),
                    -16px -6px 10px rgba(139, 0, 0, 0.7),
                    14px 16px 14px rgba(100, 0, 0, 0.5);
            }
            45% {
                text-shadow:
                    0 0 8px rgba(139, 0, 0, 1),
                    25px 12px 8px rgba(139, 0, 0, 1),
                    -20px 28px 10px rgba(139, 0, 0, 0.95),
                    16px -25px 6px rgba(139, 0, 0, 0.9),
                    -32px -10px 12px rgba(139, 0, 0, 0.8),
                    28px 30px 14px rgba(100, 0, 0, 0.7),
                    -12px -34px 8px rgba(100, 0, 0, 0.6),
                    34px -14px 10px rgba(80, 0, 0, 0.5);
            }
            70% {
                text-shadow:
                    0 0 10px rgba(139, 0, 0, 1),
                    45px 18px 10px rgba(139, 0, 0, 1),
                    -36px 44px 12px rgba(139, 0, 0, 0.95),
                    22px -42px 8px rgba(139, 0, 0, 0.9),
                    -50px -14px 14px rgba(139, 0, 0, 0.8),
                    42px 46px 16px rgba(100, 0, 0, 0.7),
                    -18px -52px 10px rgba(100, 0, 0, 0.6),
                    55px -20px 12px rgba(80, 0, 0, 0.5),
                    -46px 22px 14px rgba(80, 0, 0, 0.4);
            }
            85% {
                text-shadow:
                    0 0 8px rgba(139, 0, 0, 1),
                    20px 10px 8px rgba(139, 0, 0, 0.9),
                    -14px 20px 8px rgba(139, 0, 0, 0.7),
                    10px -16px 6px rgba(100, 0, 0, 0.5);
            }
        }

        .index-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: rgba(255, 255, 255, 0.6);

        .act-link:hover {

            background-color: rgba(139, 0, 0, 0.4);

        .act-link::after {

        .act-link:hover::after {

        .index-warning {

<body>

    <main id="main-content" class="container" role="main">
        <h1 class="title"><span class="title-line title-the-void">The <span class="void-word">Void</span></span><span class="title-line title-is" id="title-is">is</span><span class="title-line title-crimson-sunset" id="title-crimson-sunset">Crimson Sunset</span></h1>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var theVoid = document.querySelector('.title-the-void');
            var isLine = document.getElementById('title-is');
            var csLine = document.getElementById('title-crimson-sunset');
            var voidWord = document.querySelector('.void-word');

            // All 3 lines start invisible in their fixed positions
            theVoid.style.color = 'transparent';
            isLine.style.color = 'transparent';
            csLine.style.color = 'transparent';

            var voidColors = ['#000000','#1a0000','#3a0000','#5a0000','#8b0000','#aa2200','#cc3333','#dd6655','#eeaaaa','#ffffff'];
            var cascadeColors = [
                '#1a0000','#2d0000','#4a0000','#6b0000','#8b0000',
                '#a52a00','#b84400','#cc5500','#d46a00','#dd7700',
                '#e68a00','#ee9911','#dd7700','#cc5500','#bb3300',
                '#cc5544','#dd8877','#eebbaa','#f5ddd5','#ffffff'
            ];

            // === PHASE 1: "The Void" — black → red → white (2.5s) ===
            var voidStep = 0;
            var voidInterval = setInterval(function() {
                if (voidStep >= voidColors.length) {
                    clearInterval(voidInterval);
                    theVoid.style.color = '#ffffff';
                    startPhase2();
                    return;
                }
                theVoid.style.color = voidColors[voidStep];
                voidStep++;
            }, 250);

            // === PHASE 2: "is" phases in same way (fast, 0.8s), then "Crimson Sunset" cascades ===
            function startPhase2() {
                // "is" does a quick color phase
                var isStep = 0;
                var isColors = ['#1a0000','#5a0000','#8b0000','#cc3333','#eeaaaa','#ffffff'];
                var isInterval = setInterval(function() {
                    if (isStep >= isColors.length) {
                        clearInterval(isInterval);
                        isLine.style.color = '#ffffff';
                        startPhase3();
                        return;
                    }
                    isLine.style.color = isColors[isStep];
                    isStep++;
                }, 130);
            }

            // === PHASE 3: "Crimson Sunset" — cascading letter wave (2.5s) ===
            function startPhase3() {
                var text = csLine.textContent;
                csLine.textContent = '';
                csLine.style.color = '#ffffff';

                var spans = [];
                for (var i = 0; i < text.length; i++) {
                    var span = document.createElement('span');
                    span.className = 'cascade-letter';
                    span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
                    span.style.color = 'transparent';
                    csLine.appendChild(span);
                    spans.push(span);
                }

                var cycleTime = 2500;
                var staggerDelay = 80;

                spans.forEach(function(span, idx) {
                    setTimeout(function() {
                        var step = 0;
                        var stepTime = Math.floor((cycleTime - idx * staggerDelay) / cascadeColors.length);
                        stepTime = Math.max(stepTime, 40);
                        var interval = setInterval(function() {
                            if (step >= cascadeColors.length) {
                                clearInterval(interval);
                                span.style.color = '#ffffff';
                                return;
                            }
                            span.style.color = cascadeColors[step];
                            step++;
                        }, stepTime);
                    }, idx * staggerDelay);
                });

                // === PHASE 4: Tendrils start ===
                setTimeout(function() {
                    if (voidWord) voidWord.classList.add('tendrils-active');
                }, cycleTime + 500);
            }
        });
    </script>
