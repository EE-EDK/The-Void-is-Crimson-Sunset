        /* Override for index page */
        body {

        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5), 0 0 20px rgba(255, 0, 0, 0.4);
            animation: pulse 5s infinite ease-in-out;
            margin-bottom: 1rem;
        }

        .acts-navigation {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .act-link {
            font-size: clamp(1.1rem, 3.5vw, 1.6rem);
            font-weight: 400;
            color: #8b0000;
            text-decoration: none;
            border: 1px solid #4d0000;
            padding: 0.5rem 1.5rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .act-link:hover {
            color: #ffffff;
            background-color: #8b0000;
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6), 0 0 25px rgba(255, 0, 0, 0.4);
            transform: scale(1.05);
        }

        .act-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s ease;
        }

        .act-link:hover::before {
            transform: translate(-50%, -50%) scale(1);
        }

        .act-link::after {
            content: attr(data-subtitle);
            display: block;
            font-size: 0.5em;
            color: rgba(139, 0, 0, 0);
            letter-spacing: 2px;
            margin-top: 2px;
            transition: color 0.8s ease;
            font-style: italic;
        }

        .act-link:hover::after {
            color: rgba(255, 100, 100, 0.6);
        }

        .index-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(200, 200, 200, 0.5);
            letter-spacing: 3px;
            margin-bottom: 2rem;
            text-transform: lowercase;
        }

        .index-warning {
            font-size: 0.7rem;
            color: rgba(139, 0, 0, 0.4);
            letter-spacing: 2px;
            margin-top: 2rem;
            animation: warning-pulse 4s ease-in-out infinite;
        }

        @keyframes warning-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* Accessibility improvements */
        .skip-to-content {
            position: absolute;
            top: -40px;
            left: 0;
            background: #8b0000;
            color: white;
            padding: 8px;
            text-decoration: none;
            z-index: 100;
        }

        .skip-to-content:focus {
            top: 0;
        }
    </style>
