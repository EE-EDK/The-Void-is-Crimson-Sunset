<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Shader Tuner — The Void at Crimson Sunset</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; color: #ccc; }
canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }

#panel {
  position: fixed; top: 0; right: 0; width: 340px; height: 100vh;
  background: rgba(0,0,0,0.88); border-left: 1px solid #333;
  overflow-y: auto; z-index: 100; padding: 8px 10px;
  font-size: 11px;
}
#panel::-webkit-scrollbar { width: 6px; }
#panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

#panel h1 { color: #c44; font-size: 13px; margin-bottom: 6px; letter-spacing: 1px; }
.group { margin-bottom: 10px; border: 1px solid #282828; border-radius: 3px; }
.group-header {
  background: #181818; padding: 5px 8px; cursor: pointer; font-size: 11px;
  color: #a66; font-weight: bold; user-select: none; display: flex;
  justify-content: space-between; align-items: center;
}
.group-header:hover { background: #222; }
.group-header .arrow { transition: transform 0.2s; }
.group-header.collapsed .arrow { transform: rotate(-90deg); }
.group-body { padding: 4px 8px 8px; }
.group-body.hidden { display: none; }

.ctrl { margin-bottom: 5px; }
.ctrl label { display: flex; justify-content: space-between; margin-bottom: 1px; color: #999; }
.ctrl label span.val { color: #6a6; font-weight: bold; }
.ctrl input[type=range] {
  width: 100%; height: 14px; -webkit-appearance: none; background: #222;
  border-radius: 2px; outline: none;
}
.ctrl input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 14px; background: #888;
  border-radius: 2px; cursor: pointer;
}
.ctrl input[type=range]::-webkit-slider-thumb:hover { background: #aaa; }

.color-ctrl { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.color-ctrl label { color: #999; flex: 1; }
.color-ctrl input[type=color] { width: 40px; height: 20px; border: 1px solid #444; background: none; cursor: pointer; }

.btn-row { display: flex; gap: 4px; margin-bottom: 8px; }
.btn-row button {
  flex: 1; padding: 5px; background: #222; border: 1px solid #444;
  color: #ccc; cursor: pointer; font-family: monospace; font-size: 10px;
  border-radius: 2px;
}
.btn-row button:hover { background: #333; }

#toggle-panel {
  position: fixed; top: 8px; right: 8px; z-index: 200;
  background: rgba(0,0,0,0.7); border: 1px solid #555; color: #ccc;
  padding: 4px 10px; cursor: pointer; font-family: monospace; font-size: 11px;
  border-radius: 3px; display: none;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<button id="toggle-panel" onclick="document.getElementById('panel').style.display='block';this.style.display='none';">Show Panel</button>

<div class="btn-row">
  <button onclick="exportValues()">Copy Values</button>
  <button onclick="resetAll()">Reset All</button>
  <button onclick="document.getElementById('panel').style.display='none';document.getElementById('toggle-panel').style.display='block';">Hide Panel</button>

<div id="controls"></div>

// ============================================================
// BUILD UI
// ============================================================
function buildUI() {
  var container = document.getElementById('controls');
  var groups = {};

  // Group params
  Object.keys(PARAMS).forEach(function(key) {
    var p = PARAMS[key];
    if (!groups[p.group]) groups[p.group] = [];
    groups[p.group].push({ key: key, param: p });
  });

  // Add theme color first
  var colorGroup = document.createElement('div');
  colorGroup.className = 'group';
  colorGroup.innerHTML = '<div class="group-header" onclick="toggleGroup(this)"><span>Theme Color</span><span class="arrow">▼</span></div>';
  var colorBody = document.createElement('div');
  colorBody.className = 'group-body';
  colorBody.innerHTML = '<div class="color-ctrl"><label>Theme Color</label><input type="color" id="theme-color" value="#8b0000" oninput="updateThemeColor(this.value)"></div>';
  colorGroup.appendChild(colorBody);
  container.appendChild(colorGroup);

  // Build each group
  Object.keys(groups).forEach(function(groupName) {
    var div = document.createElement('div');
    div.className = 'group';

    var header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = '<span>' + groupName + '</span><span class="arrow">▼</span>';
    header.onclick = function() { toggleGroup(this); };
    div.appendChild(header);

    var body = document.createElement('div');
    body.className = 'group-body';

    groups[groupName].forEach(function(item) {
      var ctrl = document.createElement('div');
      ctrl.className = 'ctrl';
      ctrl.innerHTML =
        '<label><span>' + item.param.label + '</span><span class="val" id="val-' + item.key + '">' + item.param.val + '</span></label>' +
        '<input type="range" id="slider-' + item.key + '" min="' + item.param.min + '" max="' + item.param.max + '" step="' + item.param.step + '" value="' + item.param.val + '" oninput="updateParam(\'' + item.key + '\', this.value)">';
      body.appendChild(ctrl);
    });

    div.appendChild(body);
    container.appendChild(div);
  });
}

function toggleGroup(header) {
  header.classList.toggle('collapsed');
  var body = header.nextElementSibling;
  body.classList.toggle('hidden');
}

function updateParam(key, value) {
  PARAMS[key].val = parseFloat(value);
  document.getElementById('val-' + key).textContent = parseFloat(value).toFixed(3);
  syncUniforms();
}

function updateThemeColor(hex) {
  themeColor.r = parseInt(hex.substr(1,2), 16) / 255;
  themeColor.g = parseInt(hex.substr(3,2), 16) / 255;
  themeColor.b = parseInt(hex.substr(5,2), 16) / 255;
  if (shaderUniforms) {
    shaderUniforms.u_themeColor.value.setRGB(themeColor.r, themeColor.g, themeColor.b);
  }
}

function resetAll() {
  Object.keys(DEFAULTS).forEach(function(k) {
    PARAMS[k].val = DEFAULTS[k];
    var slider = document.getElementById('slider-' + k);
    if (slider) slider.value = DEFAULTS[k];
    var valEl = document.getElementById('val-' + k);
    if (valEl) valEl.textContent = DEFAULTS[k].toFixed(3);
  });
  document.getElementById('theme-color').value = '#8b0000';
  themeColor = { r: 139/255, g: 0, b: 0 };
  syncUniforms();
}

function exportValues() {
  var lines = ['// Shader Tuner Export — ' + new Date().toISOString()];
  Object.keys(PARAMS).forEach(function(k) {
    if (PARAMS[k].val !== DEFAULTS[k]) {
      lines.push(k + ': ' + PARAMS[k].val.toFixed(4) + '  // default: ' + DEFAULTS[k]);
    }
  });
  if (lines.length === 1) lines.push('// No values changed from defaults');
  var text = lines.join('\n');
  navigator.clipboard.writeText(text).then(function() {
    alert('Copied ' + (lines.length - 1) + ' changed values to clipboard');
  });
}

function P(key) { return PARAMS[key].val; }

  var vertexShader = 'varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }';

  var fragmentShader = [
    'uniform float u_time;',
    'uniform vec2 u_resolution;',
    'uniform float u_tension;',
    'uniform float u_scroll;',
    'uniform vec2 u_mouse;',
    'uniform vec3 u_themeColor;',
    'uniform float u_isMainPage;',
    '',
    '// Tunables',
    'uniform float u_vortex_swirl_strength, u_vortex_swirl_falloff, u_vortex_rotation_speed;',
    'uniform float u_core_swirl_strength, u_core_swirl_falloff, u_core_rotation_speed;',
    'uniform float u_core_layer1_outer, u_core_layer1_inner, u_core_layer1_dim;',
    'uniform float u_core_layer2_outer, u_core_layer2_inner, u_core_layer2_dim;',
    'uniform float u_core_layer3_outer, u_core_layer3_inner;',
    'uniform float u_watcher_falloff, u_watcher_pulse_speed, u_watcher_intensity;',
    'uniform vec3 u_watcher_color;',
    'uniform float u_threads_speed, u_threads_scale, u_threads_outer, u_threads_inner, u_threads_intensity;',
    'uniform float u_rim_outer, u_rim_center, u_rim_inner, u_rim_intensity;',
    'uniform float u_photon_inner, u_photon_inner_peak, u_photon_outer_peak, u_photon_outer, u_photon_intensity;',
    'uniform float u_arms_primary_count, u_arms_primary_speed, u_arms_primary_intensity;',
    'uniform float u_arms_filament_count, u_arms_filament_intensity;',
    'uniform float u_arms_secondary_count, u_arms_secondary_speed, u_arms_secondary_intensity;',
    'uniform float u_arms_heat_intensity, u_arms_heat_inner, u_arms_heat_outer, u_arms_turbulence;',
    'uniform float u_tendril_scale, u_tendril_speed, u_tendril_intensity, u_tendril_reach;',
    'uniform float u_stars_brightness_a, u_stars_brightness_b, u_stars_brightness_c;',
    'uniform float u_stars_density_min, u_stars_visibility;',
    'uniform float u_nebula_intensity, u_dust_warm_intensity, u_dust_cool_intensity, u_base_color_mult;',
    'uniform float u_bend_base, u_bend_tension_mult, u_refract_inner, u_refract_outer;',
    'uniform float u_vortex_falloff_outer, u_vortex_falloff_inner;',
    'uniform float u_chromatic_base, u_vignette_falloff, u_grain_intensity, u_overall_brightness;',
    'uniform float u_fluid_warp_strength, u_fluid_speed, u_weave_intensity, u_leak_intensity;',
    '',
    'varying vec2 vUv;',
    '',
    'mat2 rot(float a) { float c = cos(a), s = sin(a); return mat2(c, -s, s, c); }',
    'float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p); vec2 f = fract(p); vec2 u = f*f*(3.0-2.0*f);',
    '  return mix(mix(hash(i+vec2(0,0)),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);',
    '}',
    'float fbm(vec2 p) {',
    '  float v=0.0, a=0.5; vec2 shift=vec2(100.0);',
    '  for(int i=0;i<5;++i){v+=a*noise(p);p=rot(0.5)*p*2.0+shift;a*=0.5;}',
    '  return v;',
    '}',
    '',
    'void main() {',
    '  vec2 st = gl_FragCoord.xy / u_resolution.xy;',
    '  vec2 uv = st * 2.0 - 1.0;',
    '  uv.x *= u_resolution.x / u_resolution.y;',
    '  float dist = length(uv);',
    '',
    '  // 1. VORTEX ROTATION',
    '  if (u_isMainPage > 0.5) {',
    '    float swirl = u_vortex_swirl_strength * exp(-dist * u_vortex_swirl_falloff);',
    '    uv *= rot(u_time * u_vortex_rotation_speed + swirl);',
    '  }',
    '',
    '  // 2. EVENT HORIZON REFRACTION',
    '  float bend = smoothstep(u_refract_inner, u_refract_outer, dist) * (u_bend_base + u_tension * u_bend_tension_mult);',
    '  vec2 refractedUv = uv + normalize(uv) * bend * fbm(uv * 1.5 + u_time * 0.1);',
    '',
    '  // 3. NEBULA & STARFIELD',
    '  float n = fbm(refractedUv * 0.8 + u_time * 0.05);',
    '  vec3 starCol = vec3(0.0);',
    '',
    '  vec2 starGridA = floor(refractedUv * 40.0);',
    '  float starSeedA = hash(starGridA);',
    '  float starBrightA = pow(starSeedA, 40.0);',
    '  vec2 starCellA = fract(refractedUv * 40.0) - 0.5;',
    '  vec2 starOffA = vec2(hash(starGridA + 0.1), hash(starGridA + 0.2)) - 0.5;',
    '  float starDistA = length(starCellA - starOffA * 0.6);',
    '  float starA = smoothstep(0.06, 0.01, starDistA) * starBrightA;',
    '  float tempA = hash(starGridA + 7.0);',
    '  vec3 starTintA = mix(vec3(0.7, 0.8, 1.0), vec3(1.0, 0.85, 0.6), tempA);',
    '  starA *= 0.7 + 0.3 * sin(u_time * (2.0 + starSeedA * 4.0) + starSeedA * 6.28);',
    '  starCol += starTintA * starA * u_stars_brightness_a;',
    '',
    '  vec2 starGridB = floor(refractedUv * 90.0);',
    '  float starSeedB = hash(starGridB);',
    '  float starBrightB = pow(starSeedB, 35.0);',
    '  vec2 starCellB = fract(refractedUv * 90.0) - 0.5;',
    '  vec2 starOffB = vec2(hash(starGridB + 3.1), hash(starGridB + 3.2)) - 0.5;',
    '  float starDistB = length(starCellB - starOffB * 0.5);',
    '  float starB = smoothstep(0.04, 0.005, starDistB) * starBrightB;',
    '  float tempB = hash(starGridB + 5.0);',
    '  vec3 starTintB = mix(vec3(0.8, 0.85, 1.0), vec3(1.0, 0.9, 0.75), tempB);',
    '  starCol += starTintB * starB * u_stars_brightness_b;',
    '',
    '  vec2 starGridC = floor(refractedUv * 200.0);',
    '  float starSeedC = hash(starGridC);',
    '  float starBrightC = pow(starSeedC, 30.0) * u_stars_brightness_c;',
    '  starCol += vec3(0.9, 0.9, 1.0) * starBrightC;',
    '',
    '  float starDensity = fbm(refractedUv * 2.0);',
    '  starCol *= u_stars_density_min + starDensity * 0.9;',
    '',
    '  // 4. REALITY DISPLACEMENT',
    '  vec2 q = vec2(fbm(refractedUv + 0.1 * u_time), fbm(refractedUv + vec2(1.0)));',
    '  vec2 r = vec2(',
    '    fbm(refractedUv + 1.0*q + vec2(1.7,9.2) + u_fluid_speed * u_time),',
    '    fbm(refractedUv + 1.0*q + vec2(8.3,2.8) + 0.126 * u_time)',
    '  );',
    '  float fluidNoise = fbm(refractedUv + r * (u_fluid_warp_strength + u_tension * 2.5) - vec2(0.0, u_scroll * 2.5));',
    '',
    '  // 5. ABYSSAL VOLUMETRICS',
    '  float safeZone = 1.0 - smoothstep(0.1, 1.3, dist);',
    '  if (u_isMainPage > 0.5) safeZone *= 0.7;',
    '  float density = (1.0 - safeZone) * (0.6 + u_tension * 0.4);',
    '',
    '  vec3 baseColor = u_themeColor * u_base_color_mult;',
    '  float vortexFalloff = smoothstep(u_vortex_falloff_outer, u_vortex_falloff_inner, dist);',
    '  vec3 col = mix(baseColor * 0.05, u_themeColor * 1.2, fluidNoise * vortexFalloff);',
    '',
    '  col += u_themeColor * n * u_nebula_intensity * vortexFalloff;',
    '  float dust1 = fbm(refractedUv * 1.2 + vec2(u_time * 0.02, 0.0));',
    '  float dust2 = fbm(refractedUv * 1.8 - vec2(0.0, u_time * 0.015));',
    '  col += vec3(0.15, 0.02, 0.04) * dust1 * u_dust_warm_intensity;',
    '  col += vec3(0.02, 0.03, 0.08) * dust2 * u_dust_cool_intensity;',
    '',
    '  float starVisibility = u_stars_visibility + 1.0 * (1.0 - vortexFalloff);',
    '  col += starCol * starVisibility;',
    '',
    '  // ACCRETION DISC',
    '  float angle = atan(uv.y, uv.x);',
    '',
    '  float rays = noise(vec2(angle * u_arms_primary_count + u_time * u_arms_primary_speed, dist * 0.4)) * 0.5 + 0.5;',
    '  float clumps = noise(vec2(angle * 12.0 + u_time * 0.04, dist * 3.0)) * 0.6 + 0.4;',
    '  col += u_themeColor * rays * density * u_arms_primary_intensity * vortexFalloff * clumps;',
    '',
    '  float ridged1 = 1.0 - abs(noise(vec2(angle * u_arms_filament_count + u_time * 0.15, dist * 1.5 - u_time * 0.08)) * 2.0 - 1.0);',
    '  ridged1 = pow(ridged1, 3.0);',
    '  float filamentMask = smoothstep(0.3, 0.6, dist) * smoothstep(1.4, 0.7, dist);',
    '  float filamentClump = noise(vec2(angle * 7.0 - u_time * 0.03, dist * 2.0));',
    '  filamentClump = smoothstep(0.25, 0.6, filamentClump);',
    '  col += vec3(1.0, 0.3, 0.1) * ridged1 * filamentMask * u_arms_filament_intensity * filamentClump;',
    '',
    '  float arm2 = noise(vec2(angle * u_arms_secondary_count - u_time * u_arms_secondary_speed, dist * 0.8 + u_time * 0.05));',
    '  arm2 = smoothstep(0.4, 0.7, arm2);',
    '  col += u_themeColor * arm2 * density * u_arms_secondary_intensity * vortexFalloff;',
    '',
    '  float innerHeat = smoothstep(u_arms_heat_outer, u_arms_heat_inner+0.2, dist) * smoothstep(u_arms_heat_inner, u_arms_heat_inner+0.2, dist);',
    '  float heatNoise = noise(vec2(angle * 5.0 + u_time * 0.3, dist * 2.0));',
    '  vec3 hotColor = mix(vec3(0.6, 0.1, 0.0), vec3(1.0, 0.6, 0.2), heatNoise);',
    '  col += hotColor * innerHeat * density * u_arms_heat_intensity;',
    '',
    '  float turbulence = noise(uv * rot(u_time * 0.08) * 8.0 + r * 2.0);',
    '  turbulence *= noise(uv * rot(-u_time * 0.06) * 14.0);',
    '  float turbMask = smoothstep(0.2, 0.7, dist) * smoothstep(1.5, 0.7, dist);',
    '  col += u_themeColor * turbulence * turbMask * u_arms_turbulence;',
    '',
    '  // 6. THE CHASM CORE',
    '  if (u_isMainPage > 0.5) {',
    '    float coreSwirl = u_core_swirl_strength * exp(-dist * u_core_swirl_falloff);',
    '    vec2 coreUv = uv * rot(-u_time * u_core_rotation_speed - coreSwirl);',
    '',
    '    float layer1 = fbm(coreUv * 2.0 + u_time * 0.1);',
    '    float layer2 = fbm(coreUv * 4.0 - u_time * 0.15);',
    '    float layer3 = fbm(coreUv * 8.0 + u_time * 0.2);',
    '',
    '    float mask1 = smoothstep(u_core_layer1_outer + layer1 * 0.15, u_core_layer1_inner, dist);',
    '    float mask2 = smoothstep(u_core_layer2_outer + layer2 * 0.1, u_core_layer2_inner, dist);',
    '    float mask3 = smoothstep(u_core_layer3_outer + layer3 * 0.05, u_core_layer3_inner, dist);',
    '',
    '    col = mix(col, col * u_core_layer1_dim, mask1);',
    '    col = mix(col, col * u_core_layer2_dim, mask2);',
    '    col = mix(col, vec3(0.0), mask3);',
    '',
    '    float innerGlow = exp(-dist * dist * u_watcher_falloff);',
    '    float pulse = 0.6 + 0.4 * sin(u_time * u_watcher_pulse_speed);',
    '    col += u_watcher_color * innerGlow * pulse * u_watcher_intensity;',
    '',
    '    vec2 lightUv = uv * rot(u_time * u_threads_speed + coreSwirl);',
    '    float lightLayer = fbm(lightUv * u_threads_scale - u_time * 0.12);',
    '    float lightMask = smoothstep(u_threads_outer, u_threads_inner, dist) * smoothstep(0.05, u_threads_inner, dist);',
    '    col += u_themeColor * lightLayer * lightMask * u_threads_intensity;',
    '',
    '    float rim = smoothstep(u_rim_outer, u_rim_center, dist) * smoothstep(u_rim_inner, u_rim_center, dist);',
    '    col += u_themeColor * rim * u_rim_intensity * (0.8 + layer1 * 0.4);',
    '',
    '    float photonRing = smoothstep(u_photon_inner, u_photon_inner_peak, dist) * smoothstep(u_photon_outer, u_photon_outer_peak, dist);',
    '    float ringNoise = noise(vec2(angle * 10.0 + u_time * 0.25, dist * 8.0));',
    '    photonRing *= 0.7 + ringNoise * 0.3;',
    '    vec3 ringColor = mix(vec3(1.0, 0.5, 0.1), vec3(1.0, 0.9, 0.7), photonRing);',
    '    col += ringColor * photonRing * u_photon_intensity;',
    '',
    '    float leak = pow(fbm(uv * rot(u_time * 0.1) * 3.0), 3.0) * density;',
    '    if (dist < 0.6) { col -= vec3(leak * u_leak_intensity); }',
    '',
    '    float tendrilAngle = atan(uv.y, uv.x);',
    '    float angleNorm = tendrilAngle / 6.2832 + 0.5;',
    '    float tendrilNoise = fbm(vec2(angleNorm * u_tendril_scale + u_time * u_tendril_speed, dist * 2.0 - u_time * 0.15));',
    '    float tendrilShape = pow(tendrilNoise, 3.0);',
    '    float tendrilReach = noise(vec2(angleNorm * 6.0 - u_time * 0.05, 0.5));',
    '    float tendrilOuter = u_tendril_reach + tendrilReach * 0.5;',
    '    float tendrilMask = smoothstep(0.45, 0.55, dist) * smoothstep(tendrilOuter, 0.55, dist);',
    '    col += u_themeColor * tendrilShape * tendrilMask * u_tendril_intensity;',
    '  }',
    '',
    '  // NEURAL FLUID WEAVE',
    '  float weave = noise(refractedUv * 12.0 + r * 6.0) * density;',
    '  col -= vec3(weave * u_weave_intensity);',
    '',
    '  // CHROMATIC ABERRATION (original)',
    '  float chromaticOffset = dist * dist * (u_chromatic_base + u_tension * 0.06);',
    '  float rColor = fbm(refractedUv + vec2(chromaticOffset, 0.0) + r);',
    '  float gColor = fbm(refractedUv + r);',
    '  float bColor = fbm(refractedUv - vec2(chromaticOffset, 0.0) + r);',
    '  col.r += rColor * 0.2 * density;',
    '  col.g *= 0.97 + gColor * 0.03;',
    '  col.b += bColor * 0.2 * density;',
    '',
    '  // VIGNETTE & GRAIN',
    '  col *= smoothstep(u_vignette_falloff, 0.1, dist * (0.6 + u_tension * 0.4));',
    '  col += hash(uv * 120.0 + u_time) * u_grain_intensity;',
    '  col *= u_overall_brightness;',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  var geometry = new THREE.PlaneGeometry(2, 2);
  var material = new THREE.ShaderMaterial({
    uniforms: shaderUniforms,
    vertexShader: vertexShader,
    fragmentShader: fragmentShader,
    transparent: true, depthWrite: false, depthTest: false
  });
  scene.add(new THREE.Mesh(geometry, material));

  // Mouse
  document.addEventListener('mousemove', function(e) {
    shaderUniforms.u_mouse.value.set(e.clientX / window.innerWidth, 1.0 - e.clientY / window.innerHeight);
  }, { passive: true });

  // Resize
  window.addEventListener('resize', function() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    shaderUniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
  });

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    shaderUniforms.u_time.value = clock.getElapsedTime() * 0.5;
    renderer.render(scene, camera);
  }
  animate();
}

function syncUniforms() {
  if (!shaderUniforms) return;
  Object.keys(PARAMS).forEach(function(key) {
    var uName = 'u_' + key;
    if (shaderUniforms[uName]) {
      shaderUniforms[uName].value = PARAMS[key].val;
    }
  });
  // Special: watcher color
  shaderUniforms.u_watcher_color.value.set(P('watcher_color_r'), P('watcher_color_g'), P('watcher_color_b'));
}

// ============================================================
// BOOT
// ============================================================
buildUI();
initThree();
</script>
</body>
</html>
